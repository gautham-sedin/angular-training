<div class="dashboard">

  <h2>Dashboard Overview</h2>

  <!-- Stats -->
  <div class="cards">
    <div class="card">Total: {{ totalProjects() }}</div>
    <div class="card">Active: {{ activeProjects() }}</div>
    <div class="card">Completed: {{ completedProjects() }}</div>
  </div>

  <!-- Input -->
  <div class="input-section">
    <input
      type="text"
      [value]="newProject()"
      (input)="updateInput($any($event.target).value)"
      placeholder="Enter new project..."
    />
    <button (click)="addProject()">Add Project</button>
  </div>

  <!-- Toggle -->
  <button (click)="toggleCompleted()">
    Toggle Completed Projects
  </button>

  <!-- Clean Component Usage -->
  <app-project-list
    [projects]="filteredProjects()"
    (toggleProject)="toggleProjectStatus($event)"
  ></app-project-list>

  <!-- Tasks Manager for each of whole project management -->
   <app-task-manager></app-task-manager>

</div>
