<div class="task-container">

  <h2>Task Manager</h2>

  <!-- Stats -->
  <div class="stats">
    <span>Active: {{ taskService.activeCount() }}</span>
    <span>Completed: {{ taskService.completedCount() }}</span>
  </div>

  <!-- Input -->
  <div class="input-section">
    <input
      type="text"
      [value]="taskService.newTask()"
      (input)="taskService.updateInput($any($event.target).value)"
      placeholder="Enter new task..."
    />
    <button (click)="taskService.addTask()">Add</button>
  </div>

  <!-- Toggle -->
  <button (click)="taskService.toggleCompletedVisibility()">
    Toggle Completed Tasks
  </button>

  <!-- Task List -->
  <ul>
    @for (task of taskService.filteredTasks(); track task.id) {
      <li
        (click)="taskService.toggleTask(task.id)"
        [class.completed]="task.completed"
      >
        {{ task.title }}
      </li>
    }
  </ul>

</div>
